<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <img src="logo-mattel-ucab.png" alt="MattelUCAB Logo" />
    </div>

    <div class="login-header">
      <h1>Iniciar Sesión</h1>
      <p>Accede a tu cuenta</p>
    </div>

    <div class="login-form">

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input
          id="email"
          type="email"
          placeholder="usuario@ejemplo.com"
          [value]="email()"
          (input)="email.set($any($event.target).value)"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            placeholder="••••••••"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            autocomplete="current-password"
          />
          <button type="button" class="toggle-password" (click)="togglePassword()">
            <svg *ngIf="!showPassword()" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword()" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage()">
        <span>{{ errorMessage() }}</span>
      </div>

      <button class="btn-login" (click)="onSubmit()" [disabled]="isLoading()">
        <span *ngIf="!isLoading()">Entrar</span>
        <span *ngIf="isLoading()" class="spinner"></span>
      </button>

     

    </div>
  </div>
</div>
